<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

</head>

<body>

<h1>Chatbot Dashboard</h1>

<h2>Total Chats: {{ total_chats }}</h2>

<table border="1">

<tr>
<th>ID</th>
<th>User</th>
<th>Bot</th>
<th>Sentiment</th>
<th>Time</th>
</tr>

{% for chat in chats %}

<tr>

<td>{{ chat[0] }}</td>
<td>{{ chat[1] }}</td>
<td>{{ chat[2] }}</td>
<td>{{ chat[3] }}</td>
<td>{{ chat[4] }}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
